openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: terminal
    description: Terminal operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /terminal/info:
    get:
      operationId: getTerminalInfo
      tags: [terminal]
      summary: Get terminal info
      description: Returns info about the terminal environment
      responses:
        "200":
          description: Terminal info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TerminalInfo"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    TerminalInfo:
      type: object
      properties:
        wsUrl:
          type: string
          description: WebSocket URL for terminal connection
        tool:
          type: string
          description: Name of the pre-installed tool
        description:
          type: string
      required:
        - wsUrl
        - tool
        - description
